<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333;display:flex;height:100vh;overflow:hidden}
a{color:#1890ff;text-decoration:none}
.sidebar{width:240px;background:#001529;color:#fff;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:20px 24px;font-size:16px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.1);white-space:nowrap}
.sidebar-logo small{font-size:11px;color:rgba(255,255,255,.45);display:block;margin-top:4px;font-weight:400}
.nav-group{border-bottom:1px solid rgba(255,255,255,.06)}
.nav-group-title{padding:12px 24px 6px;font-size:11px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 24px;font-size:13px;color:rgba(255,255,255,.65);cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-item.active{color:#fff;background:#1890ff;border-left-color:#1890ff}
.nav-item .badge{background:#ff4d4f;color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:48px;background:#fff;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;padding:0 24px;justify-content:space-between;flex-shrink:0}
.topbar .user{display:flex;align-items:center;gap:8px;font-size:13px;color:#666;cursor:pointer}
.topbar .user .avatar{width:32px;height:32px;border-radius:50%;background:#1890ff;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px}
.content{flex:1;overflow-y:auto;padding:24px}
.page-title{font-size:20px;font-weight:600;margin-bottom:4px}
.page-subtitle{font-size:13px;color:#999;margin-bottom:20px}
.card{background:#fff;border-radius:8px;padding:20px 24px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}
.card-title{font-size:15px;font-weight:600;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f0f0f0}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stats-row.cols5{grid-template-columns:repeat(5,1fr)}
.stats-row.cols3{grid-template-columns:repeat(3,1fr)}
.stats-row.cols2{grid-template-columns:repeat(2,1fr)}
.stat-card{background:#fff;border-radius:8px;padding:20px;display:flex;align-items:center;gap:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-card .s-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.stat-card .s-num{font-size:26px;font-weight:700}
.stat-card .s-label{font-size:12px;color:#999;margin-top:2px}
.s-blue{background:#e6f7ff;color:#1890ff}
.s-green{background:#f6ffed;color:#52c41a}
.s-orange{background:#fff7e6;color:#fa8c16}
.s-red{background:#fff2f0;color:#ff4d4f}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;cursor:pointer;background:#fff;transition:all .2s;color:#333}
.btn:hover{border-color:#1890ff;color:#1890ff}
.btn-primary{background:#1890ff;color:#fff;border-color:#1890ff}
.btn-primary:hover{background:#40a9ff;color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-xs{padding:2px 8px;font-size:11px;border-radius:3px}
.btn-danger{color:#ff4d4f;border-color:#ff4d4f}
.btn-danger:hover{background:#fff2f0;color:#ff4d4f}
.btn-success{color:#52c41a;border-color:#52c41a}
.btn-success:hover{background:#f6ffed;color:#52c41a}
table{width:100%;border-collapse:collapse}
th{background:#fafafa;padding:10px 14px;text-align:left;font-weight:600;font-size:13px;color:#666;border-bottom:1px solid #f0f0f0;white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid #f0f0f0;font-size:13px}
tr:hover td{background:#fafafa}
tr.highlight td{background:#fffbe6}
tr.unread td{background:#f0f8ff}
.tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:500}
.tag-success{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.tag-warning{background:#fff7e6;color:#fa8c16;border:1px solid #ffd591}
.tag-danger{background:#fff2f0;color:#ff4d4f;border:1px solid #ffccc7}
.tag-info{background:#e6f7ff;color:#1890ff;border:1px solid #91d5ff}
.tag-default{background:#f5f5f5;color:#999;border:1px solid #e8e8e8}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.toolbar input,.toolbar select{height:34px;padding:0 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;background:#fff}
.toolbar input:focus,.toolbar select:focus{border-color:#1890ff;box-shadow:0 0 0 2px rgba(24,144,255,.1)}
.toolbar input{width:220px}
.toolbar .spacer{flex:1}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:5px}
.form-group label .req{color:#ff4d4f}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:7px 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;font-family:inherit}
.form-group textarea{resize:vertical;min-height:70px}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#1890ff;box-shadow:0 0 0 2px rgba(24,144,255,.1)}
.form-group input.error,.form-group select.error{border-color:#ff4d4f}
.form-group .err-msg{font-size:11px;color:#ff4d4f;margin-top:3px;display:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding-top:60px}
.modal-overlay.hidden{display:none}
.modal{background:#fff;border-radius:10px;box-shadow:0 12px 48px rgba(0,0,0,.15);width:680px;max-height:80vh;display:flex;flex-direction:column;animation:modalIn .25s}
.modal-lg{width:800px}
.modal-sm{width:480px}
@keyframes modalIn{from{opacity:0;transform:translateY(-20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid #f0f0f0}
.modal-header h3{font-size:16px;font-weight:600}
.modal-header .close-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:6px;font-size:18px;color:#999;border:none;background:none;transition:all .2s}
.modal-header .close-btn:hover{background:#f5f5f5;color:#333}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 24px;border-top:1px solid #f0f0f0;display:flex;justify-content:flex-end;gap:10px}
.org-panel{background:#fff;border-radius:8px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);height:fit-content}
.org-tree{font-size:13px;line-height:2}
.org-node{cursor:pointer;padding:3px 8px;border-radius:4px;transition:all .2s}
.org-node:hover{background:#e6f7ff}
.org-node.active{background:#1890ff;color:#fff}
.level1{padding-left:0;font-weight:600}
.level2{padding-left:20px}
.level3{padding-left:40px;font-size:12px;color:#999}
.dual-col{display:grid;grid-template-columns:240px 1fr;gap:16px}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:160px;padding:0 10px 28px;border-bottom:2px solid #e8e8e8;border-left:2px solid #e8e8e8;margin:16px 0 8px 36px}
.chart-bars .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-bars .bar{width:100%;max-width:36px;background:linear-gradient(to top,#1890ff,#69c0ff);border-radius:3px 3px 0 0;min-width:18px}
.chart-bars .bar-val{font-size:10px;color:#999}
.chart-bars .bar-label{font-size:10px;color:#666;position:relative;top:24px}
.stars{color:#faad14;font-size:13px}
.empty-state{text-align:center;padding:60px 20px;color:#999}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px}
.tab-row{display:flex;gap:0;border-bottom:2px solid #f0f0f0;margin-bottom:16px}
.tab-item{padding:8px 18px;font-size:13px;cursor:pointer;color:#666;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab-item:hover{color:#1890ff}
.tab-item.active{color:#1890ff;border-bottom-color:#1890ff;font-weight:600}
.tab-content{display:none}
.tab-content.active{display:block}
.upload-area{border:2px dashed #d9d9d9;border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;margin-top:8px}
.upload-area:hover{border-color:#1890ff;background:#fafafa}
.file-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.file-tag{display:flex;align-items:center;gap:6px;padding:4px 12px;background:#f5f5f5;border-radius:4px;font-size:12px}
.checkbox-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.checkbox-item{padding:5px 12px;border:1px solid #e8e8e8;border-radius:6px;font-size:12px;cursor:pointer;user-select:none;transition:all .2s}
.checkbox-item:hover{border-color:#1890ff}
.checkbox-item.checked{background:#e6f7ff;border-color:#1890ff;color:#1890ff}
.checkbox-item input{display:none}
.alert-banner{background:#fff2f0;border:1px solid #ffccc7;border-radius:6px;padding:10px 16px;margin-bottom:16px;font-size:13px;color:#ff4d4f;display:flex;align-items:center;gap:8px}
</style>
</head>

function statusTag(status, type){
  var m={
    "idle":"tag-success","in-transit":"tag-info","maintenance":"tag-warning","scrapped":"tag-danger",
    "pending":"tag-info","approved":"tag-success","rejected":"tag-danger",
    "dispatched":"tag-info","returned":"tag-default",
    "active":"tag-success","inactive":"tag-danger",
    "overdue":"tag-danger","soon":"tag-warning","normal":"tag-success",
    "fuel":"tag-info","toll":"tag-info","parking":"tag-default",
    "active-ws":"tag-success","suspended-ws":"tag-warning","terminated-ws":"tag-danger",
    "upcoming":"tag-info","completed":"tag-success",
    "suspended":"tag-warning","focus":"tag-default","resigned":"tag-danger",
    "todo":"tag-info","reminder":"tag-warning","system":"tag-default"
  };
  var labels={
    "idle":"空闲","in-transit":"出车中","maintenance":"维修中","scrapped":"报废",
    "pending":"待审批","approved":"已通过","rejected":"已驳回",
    "dispatched":"待出车","returned":"已归库",
    "active":"启用","inactive":"停用",
    "overdue":"已逾期","soon":"即将到期","normal":"正常",
    "fuel":"燃油费","maintenance":"维修费","insurance":"保险费","inspection":"年检费","toll":"过路费","parking":"停车费",
    "active-ws":"合作中","suspended-ws":"暂停合作","terminated-ws":"已终止",
    "upcoming":"即将开始","completed":"已完成",
    "suspended":"暂停出车","focus":"重点关注","resigned":"离职",
    "todo":"待办通知","reminder":"提醒通知","system":"系统通知",
    "pending-audit":"待审核","approved-audit":"已审核","rejected-audit":"已驳回"
  };
  var k = status + (type ? "-"+type : "");
  var cls = m[status] || m[k] || "tag-default";
  var lbl = labels[status] || labels[k] || status;
  return '<span class="tag '+cls+'">'+lbl+'</span>';
}

function statusTagFee(s){ return statusTag(s); }
function statusTagAudit(s){ return statusTag(s==="pending"?"pending-audit":s==="approved"?"approved-audit":"rejected-audit"); }
function statusTagWS(s){
  if(s==="active") return '<span class="tag tag-success">合作中</span>';
  if(s==="suspended") return '<span class="tag tag-warning">暂停合作</span>';
  return '<span class="tag tag-danger">已终止</span>';
}
function statusTagDriver(s){
  var m={idle:"空闲","in-transit":"出车中",suspended:"暂停出车",focus:"重点关注",resigned:"离职"};
  var c={idle:"tag-success","in-transit":"tag-info",suspended:"tag-warning",focus:"tag-default",resigned:"tag-danger"};
  return '<span class="tag '+(c[s]||"tag-default")+'">'+(m[s]||s)+'</span>';
}

function showToast(msg, type){
  var tc = document.getElementById("toastContainer");
  var t = document.createElement("div");
  t.style.cssText = "background:#333;color:#fff;padding:10px 24px;border-radius:6px;font-size:14px;pointer-events:none;animation:slideDown .3s";
  if(type==="success") t.style.background = "#52c41a";
  if(type==="error") t.style.background = "#ff4d4f";
  t.textContent = msg;
  tc.appendChild(t);
  setTimeout(function(){ t.style.opacity="0";t.style.transition="opacity .3s";setTimeout(function(){t.remove()},300); }, 2500);
}

function showModal(id){ document.getElementById(id).classList.remove("hidden"); }
function hideModal(id){ document.getElementById(id).classList.add("hidden"); }

function clearFormError(id){
  var el = document.getElementById(id); if(!el) return;
  el.classList.remove("error"); var err = el.parentElement.querySelector(".err-msg");
  if(err) err.style.display = "none";
}
function setFormError(id, msg){
  var el = document.getElementById(id); if(!el) return;
  el.classList.add("error"); var err = el.parentElement.querySelector(".err-msg");
  if(err){ err.textContent = msg; err.style.display = "block"; }
}
function resetForm(prefix){
  document.querySelectorAll('[id^="'+prefix+'"]').forEach(function(el){
    if(el.tagName==="INPUT"||el.tagName==="SELECT"||el.tagName==="TEXTAREA"){
      if(el.type==="checkbox") el.checked = false;
      else el.value = "";
    }
    el.classList.remove("error");
  });
}

function deptOptions(){
  return D.depts.filter(function(d){return d.parentId!=="";}).map(function(d){

}

  var pendingA = D.applications.filter(function(a){return a.status==="pending";}).length;
  var dispCount = D.dispatches.length;
  var unread = D.notifications.filter(function(n){return !n.read;}).length;

  var now = new Date();
  var alerts = [];
  D.vehicles.forEach(function(v){
    if(v.inspectionExpiry && new Date(v.inspectionExpiry) < now) alerts.push({type:"年检逾期",name:v.plate,date:v.inspectionExpiry,cls:"tag-danger"});
    else if(v.inspectionExpiry && new Date(v.inspectionExpiry) < new Date(now.getTime()+30*86400000)) alerts.push({type:"年检即将到期",name:v.plate,date:v.inspectionExpiry,cls:"tag-warning"});
    if(v.insuranceExpiry && new Date(v.insuranceExpiry) < now) alerts.push({type:"保险逾期",name:v.plate,date:v.insuranceExpiry,cls:"tag-danger"});
    else if(v.insuranceExpiry && new Date(v.insuranceExpiry) < new Date(now.getTime()+30*86400000)) alerts.push({type:"保险即将到期",name:v.plate,date:v.insuranceExpiry,cls:"tag-warning"});
  });
  D.workshops.forEach(function(w){
    if(w.status==="active" && w.contractExpiry && new Date(w.contractExpiry) < new Date(now.getTime()+30*86400000))
      alerts.push({type:"合同即将到期",name:w.name,date:w.contractExpiry,cls:"tag-warning"});
  });

  +'<div class="stat-card"><div class="s-icon s-orange">&#x1F4CB;</div><div><div class="s-num" style="color:#fa8c16">'+pendingA+'</div><div class="s-label">待审批申请</div></div></div>'
  +'<div class="stat-card"><div class="s-icon s-blue">&#x1F3C1;</div><div><div class="s-num">'+dispCount+'</div><div class="s-label">派车单数</div></div></div>'
  +'<div class="stat-card"><div class="s-icon s-red">&#x26A0;</div><div><div class="s-num" style="color:#ff4d4f">'+unread+'</div><div class="s-label">未读通知</div></div></div>'
  +'</div>';

  h += '<div class="dual-col"><div class="card" style="padding:16px"><div class="card-title">即将到期提醒</div>';
  if(alerts.length===0){ h += '<div class="empty-state"><div class="empty-icon">&#x2705;</div><p>无即将到期提醒</p></div>'; }
  else {
    h += '<table><thead><tr><th>事项</th><th>车辆/维修厂</th><th>到期日</th></tr></thead>';
    alerts.slice(0,10).forEach(function(a){ h += '<tr><td><span class="tag '+a.cls+'">'+a.type+'</span></td><td>'+a.name+'</td><td>'+a.date+'</td></tr>'; });
    h += '</table>';
  }
  h += '</div><div class="card" style="padding:16px"><div class="card-title">部门车辆统计</div><table><thead><tr><th>部门</th><th>车辆数</th></tr></thead>';
  var dc = {};

  Object.keys(dc).forEach(function(k){ h += '<tr><td>'+k+'</td><td>'+dc[k]+'</td></tr>'; });

function renderReq01Table(){
  var body = document.getElementById("req01TableBody"); if(!body) return;
  var empty = document.getElementById("req01Empty");
  var s = (document.getElementById("req01Search")||{}).value||"";
  var sf = (document.getElementById("req01StatusFilter")||{}).value||"";
  var tf = (document.getElementById("req01TypeFilter")||{}).value||"";
  var list = D.vehicles.filter(function(v){
    if(s && !(v.plate+v.brand+v.vin).toLowerCase().includes(s.toLowerCase())) return false;
    if(sf && v.status!==sf) return false;
    if(tf && v.type!==tf) return false;
    return true;
  });
  if(list.length===0){ body.innerHTML=""; empty.classList.remove("hidden"); return; }
  empty.classList.add("hidden");
  body.innerHTML = list.map(function(v){
    return '<tr><td>'+v.plate+'</td><td>'+v.brand+'</td><td>'+v.vin+'</td><td>'+v.dept+'</td><td>'+v.type+'</td><td>'+statusTag(v.status)+'</td><td>'+v.purchaseDate+'</td><td>'+v.mileage.toLocaleString()+' km</td><td><button class="btn btn-sm" onclick="viewVehicle(\''+v.id+'\')">查看</button> <button class="btn btn-sm" onclick="editVehicle(\''+v.id+'\')">编辑</button></td></tr>';
  }).join("");
}

function saveVehicle(){
  var id = document.getElementById("vehEditId").value;
  var plate = document.getElementById("vehPlate").value.trim();
  var brand = document.getElementById("vehBrand").value.trim();
  var vin = document.getElementById("vehVin").value.trim();
  var deptId = document.getElementById("vehDept").value;
  var type = document.getElementById("vehType").value;
  var purchase = document.getElementById("vehPurchase").value;
  var mileage = parseInt(document.getElementById("vehMileage").value)||0;
  var status = document.getElementById("vehStatus").value;
  var valid = true;
  if(!plate){ setFormError("vehPlate","请输入车牌号"); valid=false; } else clearFormError("vehPlate");
  if(!brand){ setFormError("vehBrand","请输入品牌型号"); valid=false; } else clearFormError("vehBrand");
  if(!vin||vin.length<5){ setFormError("vehVin","请输入有效VIN码"); valid=false; } else clearFormError("vehVin");
  if(!deptId){ setFormError("vehDept","请选择部门"); valid=false; } else clearFormError("vehDept");
  if(!type){ setFormError("vehType","请选择类型"); valid=false; } else clearFormError("vehType");
  if(!purchase){ setFormError("vehPurchase","请选择购置日期"); valid=false; } else clearFormError("vehPurchase");
  if(!mileage){ setFormError("vehMileage","请输入初始里程"); valid=false; } else clearFormError("vehMileage");
  if(!valid) return;
  var dept = getDeptById(deptId);
  if(id){
    var v = getVehicleById(id);
    v.plate=plate;v.brand=brand;v.vin=vin;v.dept=dept?dept.name:"";v.deptId=deptId;
    v.type=type;v.purchaseDate=purchase;v.mileage=mileage;v.status=status;
    showToast("车辆信息更新成功","success");
  } else {
    D.vehicles.push({id:genId("V"),plate:plate,brand:brand,vin:vin,dept:dept?dept.name:"",deptId:deptId,type:type,purchaseDate:purchase,mileage:mileage,status:status,inspectionExpiry:"",insuranceExpiry:"",insuranceCompany:"",insuranceNo:""});
    showToast("车辆添加成功","success");
  }
  hideModal("modalVehicle"); renderReq01Table(); updateBadges();
}

function renderReq02(area){
  var now = new Date();
  var overInsp = D.vehicles.filter(function(v){return v.inspectionExpiry&&new Date(v.inspectionExpiry)<now;}).length;
  var soon30 = D.vehicles.filter(function(v){var d=new Date(v.inspectionExpiry);return d>=now&&d<=new Date(now.getTime()+30*86400000);}).length;
  var overIns = D.vehicles.filter(function(v){return v.insuranceExpiry&&new Date(v.insuranceExpiry)<now;}).length;
  var h = '<div class="page-title">车辆年检与保险管理</div><div class="page-subtitle">记录年检和保险信息，支持到期提醒</div>';
  h += '<div class="toolbar"><span class="spacer"></span><button class="btn btn-primary" onclick="openInspectionsForm()">+ 录入信息</button></div>';
  h += '<div class="stats-row"><div class="stat-card"><div class="s-icon s-red">&#x26A0;</div><div><div class="s-num" style="color:#ff4d4f">'+overInsp+'</div><div class="s-label">年检逾期</div></div></div>';
  h += '<div class="stat-card"><div class="s-icon s-orange">&#x23F3;</div><div><div class="s-num" style="color:#fa8c16">'+soon30+'</div><div class="s-label">30天内到期</div></div></div>';
  h += '<div class="stat-card"><div class="s-icon s-red">&#x26A0;</div><div><div class="s-num" style="color:#ff4d4f">'+overIns+'</div><div class="s-label">保险逾期</div></div></div>';
  h += '<div class="stat-card"><div class="s-icon s-green">&#x2705;</div><div><div class="s-num">'+D.vehicles.length+'</div><div class="s-label">车辆总数</div></div></div></div>';
  h += '<div class="card" style="padding:0"><table><thead><tr><th>车牌号</th><th>年检到期日</th><th>年检状态</th><th>保险到期日</th><th>保险状态</th><th>保险公司</th><th>保单号</th><th>操作</th></tr></thead><tbody>';
  D.vehicles.forEach(function(v){
    var iS = !v.inspectionExpiry?"normal":new Date(v.inspectionExpiry)<now?"overdue":new Date(v.inspectionExpiry)<=new Date(now.getTime()+30*86400000)?"soon":"normal";
    var insS = !v.insuranceExpiry?"normal":new Date(v.insuranceExpiry)<now?"overdue":new Date(v.insuranceExpiry)<=new Date(now.getTime()+30*86400000)?"soon":"normal";
    var il = iS==="overdue"?"已逾期":iS==="soon"?"即将到期":"正常";
    var ic = iS==="overdue"?"tag-danger":iS==="soon"?"tag-warning":"tag-success";

  var reason = document.getElementById("appReason").value.trim();
  var from = document.getElementById("appFrom").value.trim();
  var to = document.getElementById("appTo").value.trim();
  var time = document.getElementById("appTime").value;
  var passengers = parseInt(document.getElementById("appPassengers").value)||1;

function doDispatch(appId){
  var app = D.applications.find(function(a){return a.id===appId;}); if(!app) return;
  var vEl = document.getElementById("dsV_"+appId); var dEl = document.getElementById("dsD_"+appId);
  var vid = vEl? vEl.value : ""; var did = dEl? dEl.value : "";
  if(!vid){ showToast("请选择车辆","error"); return; }
  if(!did){ showToast("请选择驾驶员","error"); return; }
  var v = getVehicleById(vid); var d = getDriverById(did);
  if(!v||!d){ showToast("车辆或驾驶员不存在","error"); return; }

  document.getElementById("modalConfirmTitle").textContent = "确认生成派车单";
  document.getElementById("modalConfirmBody").innerHTML = '<p>确认生成派车单：</p><p>车辆: <strong>'+v.plate+'</strong> ('+v.brand+') | 驾驶员: <strong>'+d.name+'</strong></p><p>路线: '+app.from+' → '+app.to+'</p>';
  document.getElementById("modalConfirmBtn").onclick = function(){
    var didStr = "DP"+new Date().toISOString().slice(0,10).replace(/-/g,"")+String(D.dispatches.length+1).padStart(3,"0");
    D.dispatches.push({id:didStr,applicationId:appId,vehicleId:vid,driverId:did,plate:v.plate,driver:d.name,origin:app.from,destination:app.to,departureTime:app.departureTime,status:"dispatched",startOdometer:0,endOdometer:0,distance:0});

    hideModal("modalConfirm"); renderReq05(document.getElementById("contentArea")); updateBadges();
    showToast("派车单生成成功","success");

function startDeparture(disId){

}
function confirmDeparture(){
  var disId = document.getElementById("depDisId").value;

function startReturn(disId){

  document.getElementById("retDisId").value = disId;
  document.getElementById("retEndOdo").value = ""; resetForm("ret");
  document.getElementById("retCalc").textContent = d.startOdometer ? "起始里程: "+d.startOdometer.toLocaleString()+" km" : "";
  var endEl = document.getElementById("retEndOdo");
  endEl.oninput = function(){
    var ev = parseInt(endEl.value);
    if(ev && d.startOdometer) document.getElementById("retCalc").textContent = "起始里程: "+d.startOdometer.toLocaleString()+" km | 预计行程: "+(ev-d.startOdometer).toLocaleString()+" km";

function confirmReturn(){
  var disId = document.getElementById("retDisId").value;
  var endOdo = parseInt(document.getElementById("retEndOdo").value);
  if(!endOdo&&endOdo!==0){ setFormError("retEndOdo","请输入结束里程"); return; }
  var d = D.dispatches.find(function(x){return x.id===disId;}); if(!d) return;

  h += '<div class="card" style="padding:0"><table><thead><tr><th>日期</th><th>车牌号</th><th>费用类型</th><th>金额</th><th>关联行程</th><th>审核状态</th><th>操作</th></tr></thead><tbody id="req08TableBody"></tbody></table></div>';
  area.innerHTML = h; renderReq08Table();
}

function renderReq08Table(){
  var body = document.getElementById("req08TableBody"); if(!body) return;
  var s = (document.getElementById("feeSearch")||{}).value||"";
  var tf = (document.getElementById("feeTypeFilter")||{}).value||"";
  var af = (document.getElementById("feeAuditFilter")||{}).value||"";
  var list = D.fees.filter(function(f){
    if(s && !f.plate.toLowerCase().includes(s.toLowerCase())) return false;
    if(tf && f.type!==tf) return false;
    if(af && f.auditStatus!==af) return false;
    return true;
  });
  body.innerHTML = list.map(function(f){
    var act = f.auditStatus==="pending"?'<button class="btn btn-sm btn-success" onclick="auditFee(\''+f.id+'\')">审核通过</button>':
      f.auditStatus==="rejected"?'<button class="btn btn-sm" onclick="auditFee(\''+f.id+'\')">重新审核</button>':'<button class="btn btn-sm">查看</button>';
    return '<tr><td>'+f.date+'</td><td>'+f.plate+'</td><td>'+statusTag(f.type)+'</td><td>&yen;'+f.amount.toLocaleString()+'</td><td>'+(f.linkedTrip||"-")+'</td><td>'+statusTagAudit(f.auditStatus)+'</td><td>'+act+'</td></tr>';
  }).join("");
}

function openFeeForm(){ resetForm("fee"); showModal("modalFee"); }
function saveFee(){
  var date = document.getElementById("feeDate").value;
  var plate = document.getElementById("feePlate").value;
  var type = document.getElementById("feeType").value;
  var amount = parseFloat(document.getElementById("feeAmount").value);
  var linked = document.getElementById("feeLinkedTrip").value.trim();
  var notes = document.getElementById("feeNotes").value.trim();
  if(!date){ showToast("请选择日期","error"); return; }
  if(!amount||isNaN(amount)){ showToast("请输入有效金额","error"); return; }
  D.fees.push({id:"F"+Date.now().toString(36).toUpperCase(),date:date,plate:plate,type:type,amount:amount,linkedTrip:linked||"",notes:notes||"",auditStatus:"pending"});
  hideModal("modalFee"); renderReq08Table(); showToast("费用录入成功","success");

  h += '<div class="toolbar"><input type="text" id="req13Search" placeholder="搜索车牌..." style="width:180px" oninput="renderReq13Table()"><span class="spacer"></span></div>';
  h += '<div class="card" style="padding:0"><table><thead><tr><th>车牌号</th><th>品牌型号</th><th>里程</th><th>保险到期</th><th>年检到期</th><th>违章</th><th>操作</th></tr></thead><tbody id="req13TableBody"></tbody></table></div>';
  h += '</div></div>';
  area.innerHTML = h;
  renderReq13Table();
}

function selectOrg(deptId){
  D.selectedDept = deptId;
  renderReq13(document.getElementById("contentArea"));
}

function renderReq13Table(){
  var body = document.getElementById("req13TableBody"); if(!body) return;
  var s = (document.getElementById("req13Search")||{}).value||"";
  var now = new Date();
  var filtered = D.vehicles.filter(function(v){return v.deptId===D.selectedDept;});
  if (filtered.length===0) filtered = D.vehicles.filter(function(v){return v.deptId===D.selectedDept || v.deptId.startsWith(D.selectedDept+"/");});
  var list = s ? filtered.filter(function(v){return (v.plate+v.brand).toLowerCase().includes(s.toLowerCase());}) : filtered;
  body.innerHTML = list.map(function(v){
    var insExp = v.insuranceExpiry ? (new Date(v.insuranceExpiry)<now?'<span class="tag tag-danger">已逾期</span>':new Date(v.insuranceExpiry)<=new Date(now.getTime()+30*86400000)?'<span class="tag tag-warning">30天内</span>':'<span class="tag tag-success">'+v.insuranceExpiry+'</span>') : '-';
    var inspExp = v.inspectionExpiry ? (new Date(v.inspectionExpiry)<now?'<span class="tag tag-danger">已逾期</span>':new Date(v.inspectionExpiry)<=new Date(now.getTime()+30*86400000)?'<span class="tag tag-warning">即将到期</span>':'<span class="tag tag-success">'+v.inspectionExpiry+'</span>') : '-';
    return '<tr><td>'+v.plate+'</td><td>'+v.brand+'</td><td>'+v.mileage.toLocaleString()+' km</td><td>'+insExp+'</td><td>'+inspExp+'</td><td><span class="tag tag-success">正常</span></td><td><button class="btn btn-sm btn-primary" onclick="openOperationDetail(\''+v.id+'\')">查看详情</button></td></tr>';
  }).join("");
}

function openOperationDetail(vehicleId){
  var v = getVehicleById(vehicleId); if(!v) return;
  document.getElementById("modalOpTitle").textContent = '车辆运营详情 - '+v.plate+' '+v.brand;
  
  var relatedFees = D.fees.filter(function(f){return f.plate===v.plate;});
  var refuel = relatedFees.filter(function(f){return f.type==="fuel";});
  var maint = relatedFees.filter(function(f){return f.type==="maintenance";});
  
  var h = '<div class="tab-row">'
    +'<div class="tab-item active" onclick="switchOpTab(event,\'opFuel\')">加油管理</div>'
    +'<div class="tab-item" onclick="switchOpTab(event,\'opMaint\')">维修保养</div>'
    +'<div class="tab-item" onclick="switchOpTab(event,\'opIns\')">保险管理</div>'
    +'<div class="tab-item" onclick="switchOpTab(event,\'opInsp\')">年检管理</div></div>';
  
  h += '<div class="tab-content active" id="tab-opFuel"><table><thead><tr><th>日期</th><th>金额</th><th>备注</th></tr></thead><tbody>';
  if(refuel.length===0) h += '<tr><td colspan="3"><div class="empty-state"><p>暂无加油记录</p></div></td></tr>';
  else refuel.forEach(function(f){ h += '<tr><td>'+f.date+'</td><td>&yen;'+f.amount.toLocaleString()+'</td><td>'+f.notes+'</td></tr>'; });
  h += '</tbody></table></div>';
  
  h += '<div class="tab-content" id="tab-opMaint"><table><thead><tr><th>日期</th><th>金额</th><th>备注</th></tr></thead><tbody>';
  if(maint.length===0) h += '<tr><td colspan="3"><div class="empty-state"><p>暂无维修记录</p></div></td></tr>';
  else maint.forEach(function(f){ h += '<tr><td>'+f.date+'</td><td>&yen;'+f.amount.toLocaleString()+'</td><td>'+f.notes+'</td></tr>'; });
  h += '</tbody></table></div>';
  
  var insFees = relatedFees.filter(function(f){return f.type==="insurance";});
  h += '<div class="tab-content" id="tab-opIns"><table><thead><tr><th>保险公司</th><th>保单号</th><th>保险到期日</th><th>费用</th></tr></thead><tbody>';
  h += '<tr><td>'+(v.insuranceCompany||"-")+'</td><td>'+(v.insuranceNo||"-")+'</td><td>'+(v.insuranceExpiry||"-")+'</td><td>&yen;'+(insFees.length>0?insFees.reduce(function(s,f){return s+f.amount;},0).toLocaleString():"0")+'</td></tr>';
  h += '</tbody></table></div>';
  
  h += '<div class="tab-content" id="tab-opInsp"><table><thead><tr><th>年检到期日</th><th>状态</th><th>费用</th></tr></thead><tbody>';
  var inspFees = relatedFees.filter(function(f){return f.type==="inspection";});
  var iStatus = !v.inspectionExpiry ? "normal" : new Date(v.inspectionExpiry)<new Date() ? "overdue" : new Date(v.inspectionExpiry)<=new Date(Date.now()+30*86400000) ? "soon" : "normal";
  h += '<tr><td>'+(v.inspectionExpiry||"-")+'</td><td>'+statusTag(iStatus)+'</td><td>&yen;'+(inspFees.length>0?inspFees.reduce(function(s,f){return s+f.amount;},0).toLocaleString():"0")+'</td></tr>';
  h += '</tbody></table></div>';
  
  document.getElementById("modalOpBody").innerHTML = h;
  showModal("modalOperationDetail");
}

function switchOpTab(e, tabId){
  e.target.parentElement.querySelectorAll(".tab-item").forEach(function(t){t.classList.remove("active");});
  e.target.classList.add("active");
  document.querySelectorAll("#modalOpBody .tab-content").forEach(function(t){t.classList.remove("active");});
  document.getElementById("tab-"+tabId).classList.add("active");
}

// ==================== REQ-14 定点维修车厂管理 ====================
function renderReq14(area){
  var h = '<div class="page-title">定点维修车厂管理</div><div class="page-subtitle">管理合作维修厂档案、服务能力及合作状态</div>';
  h += '<div class="stats-row"><div class="stat-card"><div class="s-icon s-blue">&#x1F527;</div><div><div class="s-num" id="wsTotal">'+D.workshops.length+'</div><div class="s-label">维修厂总数</div></div></div><div class="stat-card"><div class="s-icon s-green">&#x2705;</div><div><div class="s-num" id="wsActive">'+D.workshops.filter(function(w){return w.status==="active";}).length+'</div><div class="s-label">合作中</div></div></div><div class="stat-card"><div class="s-icon s-orange">&#x23F8;</div><div><div class="s-num" id="wsSuspended">'+D.workshops.filter(function(w){return w.status==="suspended";}).length+'</div><div class="s-label">暂停合作</div></div></div><div class="stat-card"><div class="s-icon s-red">&#x2716;</div><div><div class="s-num" id="wsTerminated">'+D.workshops.filter(function(w){return w.status==="terminated";}).length+'</div><div class="s-label">已终止</div></div></div></div>';
  h += '<div class="toolbar"><input type="text" id="wsSearch" placeholder="搜索维修厂名称/地址..." oninput="renderReq14Table()"><select id="wsStatusFilter" onchange="renderReq14Table()"><option value="">全部状态</option><option value="active">合作中</option><option value="suspended">暂停合作</option><option value="terminated">已终止</option></select><span class="spacer"></span><button class="btn btn-primary" onclick="openWorkshopForm()">+ 新增维修厂</button></div>';
  h += '<div class="card" style="padding:0"><table><thead><tr><th>维修厂名称</th><th>联系人</th><th>服务类型</th><th>综合评分</th><th>累计工单</th><th>定点状态</th><th>合同到期</th><th>操作</th></tr></thead><tbody id="req14TableBody"></tbody></table></div>';
  area.innerHTML = h; renderReq14Table();
}

function renderReq14Table(){
  var body = document.getElementById("req14TableBody"); if(!body) return;
  var s = (document.getElementById("wsSearch")||{}).value||"";
  var sf = (document.getElementById("wsStatusFilter")||{}).value||"";
  var list = D.workshops.filter(function(w){
    if(s && !(w.name+w.address+w.contact).toLowerCase().includes(s.toLowerCase())) return false;
    if(sf && w.status!==sf) return false;
    return true;
  });
  
  body.innerHTML = list.map(function(w){
    var stars = [1,2,3,4,5].map(function(i){return i<=Math.round(w.rating)?'&#9733;':'&#9734;';}).join("");
    var sTagHtml = w.status==="active"?'<span class="tag tag-success">合作中</span>':w.status==="suspended"?'<span class="tag tag-warning">暂停合作</span>':'<span class="tag tag-danger">已终止</span>';
    var types = w.serviceTypes.slice(0,3).map(function(t){return '<span class="tag tag-default" style="margin:1px">'+t+'</span>';}).join(" ");
    var actions = '<button class="btn btn-sm" onclick="editWorkshop(\''+w.id+'\')">编辑</button> <button class="btn btn-sm" onclick="viewWorkshopDashboard(\''+w.id+'\')">看板</button>';
    if(w.status==="active") actions += ' <button class="btn btn-sm btn-warning" onclick="changeWSStatus(\''+w.id+'\',\'suspended\')">暂停</button>';
    if(w.status==="suspended") actions += ' <button class="btn btn-sm btn-success" onclick="changeWSStatus(\''+w.id+'\',\'active\')">恢复</button>';
    if(w.status!=="terminated") actions += ' <button class="btn btn-sm btn-danger" onclick="changeWSStatus(\''+w.id+'\',\'terminated\')">终止</button>';
    return '<tr><td>'+w.name+'</td><td>'+w.contact+'<br><span style="font-size:11px;color:#999">'+w.phone+'</span></td><td>'+types+'</td><td><span class="stars">'+stars+'</span> '+w.rating+'</td><td>'+w.orders+'</td><td>'+sTagHtml+'</td><td>'+(w.contractExpiry||"-")+'</td><td style="white-space:nowrap">'+actions+'</td></tr>';
  }).join("");
  
  document.getElementById("wsTotal").textContent = D.workshops.length;
  document.getElementById("wsActive").textContent = D.workshops.filter(function(w){return w.status==="active";}).length;
  document.getElementById("wsSuspended").textContent = D.workshops.filter(function(w){return w.status==="suspended";}).length;
  document.getElementById("wsTerminated").textContent = D.workshops.filter(function(w){return w.status==="terminated";}).length;
}

function openWorkshopForm(editId){
  var ws = editId ? D.workshops.find(function(w){return w.id===editId;}) : null;
  if(ws){
    document.getElementById("modalWorkshopTitle").textContent = "编辑维修厂";
    document.getElementById("wsEditId").value = ws.id;
    document.getElementById("wsName").value = ws.name;
    document.getElementById("wsCreditCode").value = ws.creditCode;
    document.getElementById("wsContact").value = ws.contact;
    document.getElementById("wsPhone").value = ws.phone;
    document.getElementById("wsAddress").value = ws.address;
    document.getElementById("wsScope").value = ws.scope||"";
    document.getElementById("wsRating").value = ws.rating;
    document.getElementById("wsContractExpiry").value = ws.contractExpiry||"";
    
    document.querySelectorAll("#modalWorkshop .checkbox-item").forEach(function(el){
      el.classList.remove("checked");
      var cb = el.querySelector("input");
      cb.checked = ws.serviceTypes.includes(cb.value);
      if(cb.checked) el.classList.add("checked");
    });
    
    document.getElementById("wsFileList").innerHTML = ws.files.map(function(f){return '<span class="file-tag">'+f+' <span style="cursor:pointer;color:#999" onclick="this.parentElement.remove()">&times;</span></span>';}).join("");
  } else {
    document.getElementById("modalWorkshopTitle").textContent = "新增维修厂";
    document.getElementById("wsEditId").value = "";
    resetForm("ws");
    document.querySelectorAll("#modalWorkshop .checkbox-item").forEach(function(el){ el.classList.remove("checked"); });
    document.getElementById("wsFileList").innerHTML = "";
  }
  showModal("modalWorkshop");
}
function editWorkshop(id){ openWorkshopForm(id); }
function saveWorkshop(){
  var id = document.getElementById("wsEditId").value;
  var name = document.getElementById("wsName").value.trim();
  var creditCode = document.getElementById("wsCreditCode").value.trim();
  var contact = document.getElementById("wsContact").value.trim();
  var phone = document.getElementById("wsPhone").value.trim();
  var address = document.getElementById("wsAddress").value.trim();
  var scope = document.getElementById("wsScope").value.trim();
  var rating = parseFloat(document.getElementById("wsRating").value)||4.0;
  var contractExpiry = document.getElementById("wsContractExpiry").value;
  var valid = true;
  if(!name){ setFormError("wsName","请输入名称"); valid=false; } else clearFormError("wsName");
  if(!creditCode||creditCode.length<10){ setFormError("wsCreditCode","请输入有效信用代码"); valid=false; } else clearFormError("wsCreditCode");
  if(!contact){ setFormError("wsContact","请输入联系人"); valid=false; } else clearFormError("wsContact");
  if(!phone){ setFormError("wsPhone","请输入电话"); valid=false; } else clearFormError("wsPhone");
  if(!address){ setFormError("wsAddress","请输入地址"); valid=false; } else clearFormError("wsAddress");
  if(!valid) return;
  
  var serviceTypes = [];
  document.querySelectorAll("#modalWorkshop .checkbox-item input:checked").forEach(function(cb){ serviceTypes.push(cb.value); });
  
  var fileTags = document.querySelectorAll("#wsFileList .file-tag");
  var files = Array.from(fileTags).map(function(t){return t.childNodes[0].textContent;});
  
  if(id){
    var ws = D.workshops.find(function(w){return w.id===id;});
    if(ws){ ws.name=name;ws.creditCode=creditCode;ws.contact=contact;ws.phone=phone;ws.address=address;ws.scope=scope;ws.rating=rating;ws.serviceTypes=serviceTypes;ws.contractExpiry=contractExpiry;ws.files=files; }
    showToast("维修厂信息更新成功","success");
  } else {
    D.workshops.push({id:"WS"+Date.now().toString(36).toUpperCase(),name:name,creditCode:creditCode,contact:contact,phone:phone,address:address,scope:scope,serviceTypes:serviceTypes,rating:rating,orders:0,status:"active",contractExpiry:contractExpiry,files:files});
    showToast("维修厂添加成功","success");
  }
  hideModal("modalWorkshop"); renderReq14Table();
}

function changeWSStatus(id, newStatus){
  var ws = D.workshops.find(function(w){return w.id===id;}); if(!ws) return;
  var titles = {suspended:"暂停合作",active:"恢复合作",terminated:"终止合作"};
  var msgs = {suspended:'确认将 <strong>'+ws.name+'</strong> 设为<strong>暂停合作</strong>？新工单将不再分配。',
              active:'确认将 <strong>'+ws.name+'</strong> 恢复为<strong>合作中</strong>？',
              terminated:'确认将 <strong>'+ws.name+'</strong> <strong style="color:#ff4d4f">终止合作</strong>？将从可选列表移除。'};
  document.getElementById("modalConfirmTitle").textContent = titles[newStatus];
  document.getElementById("modalConfirmBody").innerHTML = '<p>'+msgs[newStatus]+'</p>';
  document.getElementById("modalConfirmBtn").onclick = function(){
    ws.status = newStatus;
    hideModal("modalConfirm"); renderReq14Table(); updateBadges();
    showToast(titles[newStatus]+"完成","success");
  };
  showModal("modalConfirm");
}

function viewWorkshopDashboard(id){
  var ws = D.workshops.find(function(w){return w.id===id;}); if(!ws) return;
  var mockMonthly = [12,8,15,10,18,14,20,16,11,13,9,17];
  var maxM = Math.max.apply(null,mockMonthly);
  var stars = [1,2,3,4,5].map(function(i){return i<=Math.round(ws.rating)?'&#9733;':'&#9734;';}).join("");
  
  var h = '<div class="stats-row cols2" style="margin-bottom:16px"><div class="stat-card"><div class="s-icon s-blue">&#x1F4CB;</div><div><div class="s-num">'+ws.orders+'</div><div class="s-label">累计工单数</div></div></div><div class="stat-card"><div class="s-icon s-orange">&#x2B50;</div><div><div class="s-num">'+ws.rating+'</div><div class="s-label">综合评分</div></div></div></div>';
  h += '<p style="margin-bottom:8px"><strong>服务类型:</strong> '+ws.serviceTypes.join(" / ")+'</p>';
  h += '<p>'+stars+'</p>';
  h += '<div class="card-title">月度工单统计</div><div class="chart-bars" style="height:180px">';
  mockMonthly.forEach(function(v,i){
    h += '<div class="bar-col"><div class="bar-val">'+v+'</div><div class="bar" style="height:'+(v/maxM*140)+'px"></div><div class="bar-label">'+(i+1)+'月</div></div>';
  });
  h += '</div>';
  
  document.getElementById("modalWorkshopViewBody").innerHTML = h;
  showModal("modalWorkshopView");
}
