<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>普通用户-移动端原型</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e8ecf1;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px;gap:30px}
.analysis{width:340px;background:#fff;border-radius:16px;padding:24px;box-shadow:0 4px 16px rgba(0,0,0,.06);position:sticky;top:20px}
.analysis h2{font-size:20px;color:#1a1a1a;margin-bottom:4px}
.analysis .sub{font-size:12px;color:#999;margin-bottom:20px}
.analysis h3{font-size:14px;color:#1a73e8;margin:16px 0 8px;border-left:3px solid #1a73e8;padding-left:8px}
.analysis p,.analysis li{font-size:13px;color:#555;line-height:1.8}
.analysis ul{padding-left:16px}
.analysis .flow{display:flex;align-items:center;gap:6px;font-size:12px;color:#1a73e8;font-weight:600;flex-wrap:wrap;margin:8px 0}
.analysis .flow span{background:#e8f0fe;padding:4px 10px;border-radius:12px;white-space:nowrap}

.phone-shell{display:flex;flex-direction:column;align-items:center;gap:8px}
.phone-label{font-size:13px;color:#999;font-weight:600}
.phone-frame{width:390px;height:780px;background:#fff;border-radius:36px;box-shadow:0 20px 60px rgba(0,0,0,.15),0 0 0 3px #222,0 0 0 6px #444,0 0 0 8px #333;overflow:hidden;position:relative}
.phone-notch{width:130px;height:30px;background:#222;border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:10}
.phone-content{height:100%;display:flex;flex-direction:column;padding-top:30px}
.status-bar{height:32px;display:flex;justify-content:space-between;align-items:center;padding:0 28px;font-size:12px;font-weight:600;color:#333;flex-shrink:0;background:#fff}
.nav-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:#fff}
.nav-header .title{font-size:18px;font-weight:700}
.nav-header .right{display:flex;align-items:center;gap:12px}
.nav-header .badge-wrap{position:relative}
.nav-header .badge{position:absolute;top:-2px;right:-2px;min-width:16px;height:16px;background:#ee0a24;color:#fff;border-radius:8px;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.nav-header .avatar{width:32px;height:32px;border-radius:50%;background:#1a73e8;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600}
.page-body{flex:1;overflow-y:auto;padding:12px 16px 60px;background:#f5f6f8}
.page-body::-webkit-scrollbar{display:none}
.bottom-bar{position:absolute;bottom:0;width:100%;height:56px;display:flex;border-top:1px solid #eee;background:#fff;padding-bottom:4px}
.bottom-bar .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer}
.bottom-bar .tab .lbl{font-size:10px;color:#bbc0c8}
.bottom-bar .tab.active .lbl{color:#1a73e8;font-weight:600}
.bottom-bar .tab svg{width:22px;height:22px}

.btn-primary{background:#1a73e8;color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer}
.hero-btn{background:linear-gradient(135deg,#1a73e8,#4080ff);color:#fff;border:none;border-radius:16px;padding:22px;text-align:center;font-size:17px;font-weight:700;cursor:pointer;width:100%;margin-bottom:16px;box-shadow:0 4px 12px rgba(26,115,232,.3)}
.hero-btn .plus{font-size:30px;display:block;font-weight:300;line-height:1;margin-bottom:4px}
.section-title{font-size:14px;font-weight:700;color:#333;margin:8px 0 10px;padding-left:6px;border-left:3px solid #1a73e8}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;position:relative}
.card.pending{border-left:3px solid #fa8c16}
.card.approved{border-left:3px solid #52c41a}
.card.rejected{border-left:3px solid #f5222d}
.card-row{display:flex;justify-content:space-between;align-items:center}
.card-title{font-size:15px;font-weight:600;color:#1a1a1a}
.card-meta{font-size:12px;color:#999;margin-top:3px}
.card-route{font-size:12px;color:#666;margin-top:2px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-pending{background:#fff7e6;color:#fa8c16}
.tag-pass{background:#f6ffed;color:#52c41a}
.tag-reject{background:#fff1f0;color:#f5222d}
.tag-urgent{background:#fff1f0;color:#f5222d}
.tag-normal{background:#e6f7ff;color:#1890ff}

.sim-page{display:none}
.sim-page.active{display:block}
.form-group{margin-bottom:16px}
.form-label{font-size:13px;font-weight:600;color:#333;margin-bottom:6px;display:block}
.form-input{width:100%;height:40px;border:1px solid #e8e8e8;border-radius:8px;padding:0 12px;font-size:14px;outline:none}
.form-input:focus{border-color:#1a73e8}
.form-textarea{width:100%;height:70px;border:1px solid #e8e8e8;border-radius:8px;padding:10px 12px;font-size:14px;resize:none;outline:none}
.radio-group{display:flex;gap:16px}
.radio-item{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer}
.radio-dot{width:18px;height:18px;border-radius:50%;border:2px solid #ddd;display:flex;align-items:center;justify-content:center}
.radio-dot.checked{border-color:#1a73e8}
.radio-dot.checked::after{content:'';width:10px;height:10px;border-radius:50%;background:#1a73e8}
.steps-bar{display:flex;background:#fff;padding:16px}
.step-dot{flex:1;text-align:center;position:relative}
.step-dot::before{content:'';position:absolute;top:12px;left:0;right:50%;height:2px;background:#e8e8e8;z-index:0}
.step-dot::after{content:'';position:absolute;top:12px;left:50%;right:0;height:2px;background:#e8e8e8;z-index:0}
.step-dot:first-child::before{display:none}
.step-dot:last-child::after{display:none}
.step-dot .dot{width:26px;height:26px;border-radius:50%;background:#e8e8e8;display:inline-flex;align-items:center;justify-content:center;font-size:12px;color:#fff;position:relative;z-index:1}
.step-dot.active .dot{background:#1a73e8}
.step-dot.done .dot{background:#52c41a}
.step-dot .lbl{font-size:11px;color:#999;margin-top:4px;display:block}
.step-dot.active .lbl{color:#1a73e8;font-weight:600}
.quick-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.quick-tag{background:#e8f0fe;color:#1a73e8;padding:6px 14px;border-radius:16px;font-size:12px;cursor:pointer;border:none}
.quick-tag.selected{background:#1a73e8;color:#fff}
.step-btns{display:flex;gap:12px;padding:12px 16px;background:#fff;border-top:1px solid #f0f0f0;position:absolute;bottom:0;width:100%}
.step-btns button{flex:1}
.hidden{display:none!important}
.back-nav{padding:10px 16px;background:#fff;display:flex;align-items:center;gap:8px;font-size:16px;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<div class="analysis">
  <h2>普通用户</h2>
  <div class="sub">Employee - 移动端原型设计</div>
  <h3>角色定位</h3>
  <p>普通员工是移动端最高频使用者，核心操作是发起用车申请和跟踪申请进度。</p>
  <h3>功能流程</h3>
  <div class="flow"><span>首页</span>→<span>申请用车</span>→<span>填写信息</span>→<span>行程路线</span>→<span>确认提交</span></div>
  <h3>页面清单</h3>
  <ul>
    <li>首页：一键申请入口 + 申请列表</li>
    <li>用车申请：3步表单（事由→路线→确认）</li>
    <li>申请详情：完整申请信息 + 审批进度</li>
    <li>消息通知：审批结果推送</li>
  </ul>
  <h3>设计要点</h3>
  <ul>
    <li>申请入口放在首页最显眼位置</li>
    <li>3步完成申请，每步 ≤3 个字段</li>
    <li>支持常用路线快速选择</li>
    <li>卡片颜色区分审批状态（黄/绿/红）</li>
  </ul>
</div>

<div class="phone-shell">
  <div class="phone-label">普通用户 · 王小明</div>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="phone-content" id="screen"></div>
  </div>
</div>

<script>
function timeNow(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}
function bellIcon(c){return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${c||'#666'}" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>`}
function homeIcon(fill){return `<svg width="22" height="22" viewBox="0 0 24 24" fill="${fill||'#bbc0c8'}"><path d="M3 13h1v7c0 1.103.897 2 2 2h12c1.103 0 2-.897 2-2v-7h1a1 1 0 00.707-1.707l-9-9a.999.999 0 00-1.414 0l-9 9A1 1 0 003 13zm7 7v-5h4v5h-4zm2-15.586l6 6V20h-2v-5c0-1.103-.897-2-2-2h-4c-1.103 0-2 .897-2 2v5H6v-6.586l6-6z"/></svg>`}
function msgIcon(fill){return `<svg width="22" height="22" viewBox="0 0 24 24" fill="${fill||'#bbc0c8'}"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>`}
function orderIcon(fill){return `<svg width="22" height="22" viewBox="0 0 24 24" fill="${fill||'#bbc0c8'}"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2zm0-4H7V7h10v2z"/></svg>`}

const screen=document.getElementById('screen');
let currentTab='home';
let applyStep=0;

function renderHome(){
  return `<div class="status-bar"><span>${timeNow()}</span><span>5G 🔋</span></div>
<div class="nav-header">
  <div class="title">公务用车</div>
  <div class="right">
    <div class="badge-wrap">${bellIcon('#666')}<div class="badge">2</div></div>
    <div class="avatar">王</div>
  </div>
</div>
<div class="page-body" id="homeBody">
  <div class="hero-btn" onclick="goPage('applyCreate')"><span class="plus">+</span>申请用车</div>
  <div class="section-title">我的申请</div>
  <div class="card pending" onclick="goPage('applyDetail')">
    <div class="card-row"><span class="card-title">外出调研</span><span class="tag tag-pending">审批中</span></div>
    <div class="card-meta">07-09 14:00 · 2人</div>
    <div class="card-route">总部 → 高新区管委会</div>
  </div>
  <div class="card approved" onclick="goPage('applyDetail')">
    <div class="card-row"><span class="card-title">客户拜访</span><span class="tag tag-pass">已通过</span></div>
    <div class="card-meta">07-08 09:30 · 1人</div>
    <div class="card-route">总部 → 金融港大厦</div>
  </div>
  <div class="card rejected" onclick="goPage('applyDetail')">
    <div class="card-row"><span class="card-title">设备验收</span><span class="tag tag-reject">已驳回</span></div>
    <div class="card-meta">07-07 15:00 · 3人</div>
    <div class="card-route">总部 → 开发区工厂</div>
  </div>
</div>
<div class="bottom-bar">
  <div class="tab active"><div>${homeIcon('#1a73e8')}</div><div class="lbl" style="color:#1a73e8;font-weight:600">首页</div></div>
  <div class="tab" onclick="goPage('notifications')"><div>${msgIcon()}</div><div class="lbl">消息</div></div>
  <div class="tab"><div>${orderIcon()}</div><div class="lbl">我的申请</div></div>
</div>`;
}

function renderApplyCreate(){
  let body='';
  if(applyStep===0){
    body=`<div class="form-group"><span class="form-label">用车事由 *</span><input class="form-input" placeholder="请输入用车事由" value="外出调研" onchange="this.setAttribute('data-val',this.value)"></div>
<div class="form-group"><span class="form-label">乘车人数 *</span><input class="form-input" type="number" placeholder="请输入人数" value="2"></div>
<div class="form-group"><span class="form-label">是否需要司机</span>
  <div class="radio-group">
    <div class="radio-item" onclick="toggleRadio(this,'needDriver',1)"><div class="radio-dot checked"></div>需要</div>
    <div class="radio-item" onclick="toggleRadio(this,'needDriver',0)"><div class="radio-dot"></div>不需要</div>
  </div>
</div>
<div class="form-group"><span class="form-label">备注</span><textarea class="form-textarea" placeholder="选填"></textarea></div>`;
  }else if(applyStep===1){
    body=`<div class="form-group"><span class="form-label">出发地 *</span><input class="form-input" placeholder="请输入出发地" value="总部"></div>
<div class="form-group"><span class="form-label">目的地 *</span><input class="form-input" placeholder="请输入目的地" value="高新区管委会"></div>
<div class="form-group"><span class="form-label">预计出发时间 *</span><input class="form-input" value="2026-07-09 14:00" readonly onclick="alert('选择时间')"></div>
<div class="form-group"><span class="form-label">预计返回时间 *</span><input class="form-input" value="2026-07-09 18:00" readonly onclick="alert('选择时间')"></div>
<span class="form-label" style="margin-bottom:8px;display:block">常用路线</span>
<div class="quick-tags">
  <span class="quick-tag selected" onclick="this.parentElement.querySelectorAll('.quick-tag').forEach(t=>t.classList.remove('selected'));this.classList.add('selected')">总部 → 市政府</span>
  <span class="quick-tag" onclick="this.parentElement.querySelectorAll('.quick-tag').forEach(t=>t.classList.remove('selected'));this.classList.add('selected')">总部 → 高铁站</span>
  <span class="quick-tag" onclick="this.parentElement.querySelectorAll('.quick-tag').forEach(t=>t.classList.remove('selected'));this.classList.add('selected')">总部 → 临港产业园</span>
</div>`;
  }else{
    body=`<div style="background:#fff;border-radius:12px;padding:14px;margin-bottom:10px">
<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5"><span style="color:#999;font-size:13px">用车事由</span><span style="font-size:13px">外出调研</span></div>
<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5"><span style="color:#999;font-size:13px">乘车人数</span><span style="font-size:13px">2人</span></div>
<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5"><span style="color:#999;font-size:13px">是否需司机</span><span style="font-size:13px">需要</span></div>
<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5"><span style="color:#999;font-size:13px">出发地</span><span style="font-size:13px">总部</span></div>
<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5"><span style="color:#999;font-size:13px">目的地</span><span style="font-size:13px">高新区管委会</span></div>
<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5"><span style="color:#999;font-size:13px">预计出发</span><span style="font-size:13px">07-09 14:00</span></div>
<div style="display:flex;justify-content:space-between;padding:10px 0"><span style="color:#999;font-size:13px">预计返回</span><span style="font-size:13px">07-09 18:00</span></div>
</div>
<button class="btn-primary" style="width:100%;height:44px;border-radius:22px;margin-top:16px;font-size:15px" onclick="alert('申请提交成功！');goPage('home')">提交申请</button>`;
  }

  const steps=['基本信息','行程信息','确认提交'];
  let stepsHtml='<div class="steps-bar">';
  for(let i=0;i<3;i++){
    let cls=''; if(i<applyStep) cls='done'; else if(i===applyStep) cls='active';
    stepsHtml+=`<div class="step-dot ${cls}"><div class="dot">${cls==='done'?'✓':i+1}</div><div class="lbl">${steps[i]}</div></div>`;
  }
  stepsHtml+='</div>';

  return `<div class="back-nav" onclick="goPage('home')">← 返回</div>`+stepsHtml+
`<div class="page-body">${body}</div>
<div class="step-btns ${applyStep===2?'hidden':''}">
  ${applyStep>0?'<button class="btn-primary" style="background:#f5f5f5;color:#666" onclick="applyStep--;render()">上一步</button>':''}
  <button class="btn-primary" style="${applyStep===0?'flex:2':''}" onclick="if(applyStep<2){applyStep++;render()}">下一步</button>
</div>`;
}

function renderApplyDetail(){
  return `<div class="back-nav" onclick="goPage('home')">← 申请详情</div>
<div class="page-body">
  <div style="background:#fff;border-radius:12px;padding:14px;margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:17px;font-weight:700">外出调研</span>
      <span class="tag tag-pending">审批中</span>
    </div>
    <div style="background:#f5f7fa;border-radius:8px;padding:12px;margin:10px 0">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#999;margin-bottom:6px"><span>提交申请</span><span>07-08 10:00</span></div>
      <div style="width:100%;height:4px;background:#52c41a;border-radius:2px"></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#999;margin-top:6px"><span>部门审批</span><span style="color:#fa8c16">审批中</span></div>
      <div style="width:100%;height:4px;background:#e8e8e8;border-radius:2px;margin-top:4px"></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#999;margin-top:6px"><span>车辆调度</span><span>--</span></div>
    </div>
  </div>
  <div style="background:#fff;border-radius:12px;padding:14px">
    <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5"><span style="color:#999;font-size:13px">申请人</span><span style="font-size:13px">王小明</span></div>
    <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5"><span style="color:#999;font-size:13px">用车事由</span><span style="font-size:13px">外出调研</span></div>
    <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5"><span style="color:#999;font-size:13px">出发地</span><span style="font-size:13px">总部</span></div>
    <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5"><span style="color:#999;font-size:13px">目的地</span><span style="font-size:13px">高新区管委会</span></div>
    <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5"><span style="color:#999;font-size:13px">乘车人数</span><span style="font-size:13px">2人</span></div>
    <div style="display:flex;justify-content:space-between;padding:10px 0"><span style="color:#999;font-size:13px">提交时间</span><span style="font-size:13px">07-08 10:00</span></div>
  </div>
</div>`;
}

function renderNotifications(){
  return `<div class="back-nav" onclick="goPage('home')">← 消息通知</div>
<div class="page-body">
  <div style="background:#fff;border-radius:12px;padding:8px 14px">
    <div style="display:flex;gap:10px;padding:14px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start">
      <div style="width:40px;height:40px;border-radius:50%;background:#e8f0fe;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="color:#1a73e8">📋</span></div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600">申请已通过</div><div style="font-size:12px;color:#999;margin-top:2px">客户拜访用车申请已通过部门审批</div><div style="font-size:11px;color:#bbb;margin-top:4px">2小时前</div></div>
      <div style="width:8px;height:8px;border-radius:50%;background:#ee0a24;margin-top:4px"></div>
    </div>
    <div style="display:flex;gap:10px;padding:14px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start">
      <div style="width:40px;height:40px;border-radius:50%;background:#fff1f0;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="color:#f5222d">✕</span></div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600">申请已驳回</div><div style="font-size:12px;color:#999;margin-top:2px">设备验收申请已被驳回，原因：车辆资源不足</div><div style="font-size:11px;color:#bbb;margin-top:4px">昨天</div></div>
    </div>
    <div style="display:flex;gap:10px;padding:14px 0">
      <div style="width:40px;height:40px;border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="color:#999">ℹ</span></div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600">系统通知</div><div style="font-size:12px;color:#999;margin-top:2px">系统将于今晚22:00进行维护升级</div><div style="font-size:11px;color:#bbb;margin-top:4px">昨天</div></div>
    </div>
  </div>
</div>`;
}

function goPage(page){
  currentTab=page;
  if(page==='applyCreate') applyStep=0;
  if(page==='notifications') render(); else if(page==='home') {currentTab='home';render();} else render();
}

function toggleRadio(el,name,val){
  const parent=el.parentElement;
  parent.querySelectorAll('.radio-dot').forEach(d=>d.classList.remove('checked'));
  el.querySelector('.radio-dot').classList.add('checked');
}

function render(){
  if(currentTab==='home') screen.innerHTML=renderHome();
  else if(currentTab==='applyCreate') screen.innerHTML=renderApplyCreate();
  else if(currentTab==='applyDetail') screen.innerHTML=renderApplyDetail();
  else if(currentTab==='notifications') screen.innerHTML=renderNotifications();
}

render();
</script>
</body>
